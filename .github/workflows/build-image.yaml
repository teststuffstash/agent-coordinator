# Build + push the agent-coordinator image to ghcr on every master push. Single responsibility: this
# repo produces one artifact, so there are no path filters or "is this a deploy?" rules — every push
# to master builds. The tag is content-addressed by the Dockerfile (same Dockerfile → same tag), so a
# rebuild is reproducible; note the `@latest` apt/npm pins (gh, claude) can still drift the image
# content without a Dockerfile change — pin them if bit-reproducibility matters.
#
# amd64-only (the coordinator runs in-cluster on x86). Self-hosted ARC runner (homelab-ephemeral);
# ghcr push auth is the job's GITHUB_TOKEN (packages: write) — no extra secret. Mirrors agent-runtime.
name: build-image

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  image:
    runs-on: homelab-ephemeral
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute reproducible tag from the Dockerfile
        id: ver
        run: echo "tag=$(date -u +%Y-%m-%d)-$(sha256sum coordinator/Dockerfile | cut -c1-8)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: coordinator/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agent-coordinator:${{ steps.ver.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/agent-coordinator:latest
